<!DOCTYPE html>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                        pixel: ['DotGothic16', 'monospace']
                    },
                    colors: {
                        brand: {
                            bg: '#FBF9F6',
                            textBase: '#6E6E6E',
                            black: '#000000',
                            border: '#E5E5E5'
                        }
                    },
                    animation: {
                        'cloud-glide': 'cloud-glide 75s ease-in-out infinite',
                        'marquee': 'marquee 40s linear infinite',
                    },
                    keyframes: {
                        'cloud-glide': {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '50%': { transform: 'translateX(-2%)' },
                        },
                        'marquee': {
                            '0%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .bg-lines {
            background-image: repeating-linear-gradient(rgba(0, 0, 0, 0.06) 0px, rgba(0, 0, 0, 0.06) 1px, transparent 1px, transparent 12px);
        }

        .bg-glow {
            background: radial-gradient(65% 50% at 50% 42%, rgba(251, 249, 246, 0.5) 0%, rgba(251, 249, 246, 0.4) 45%, rgba(251, 249, 246, 0) 72%);
        }

        .dot-matrix {
            background-image: radial-gradient(circle at center, rgba(0,0,0,0.5) 1.2px, transparent 1.2px);
            background-size: 8px 8px;
        }

        .mask-cloud-left {
            -webkit-mask-image:
                radial-gradient(ellipse 50% 50% at 10% 90%, black 20%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 25% 70%, black 15%, transparent 60%),
                radial-gradient(ellipse 35% 35% at 35% 85%, black 20%, transparent 65%),
                radial-gradient(ellipse 30% 30% at 5% 60%, black 5%, transparent 45%);
            mask-image:
                radial-gradient(ellipse 50% 50% at 10% 90%, black 20%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 25% 70%, black 15%, transparent 60%),
                radial-gradient(ellipse 35% 35% at 35% 85%, black 20%, transparent 65%),
                radial-gradient(ellipse 30% 30% at 5% 60%, black 5%, transparent 45%);
        }

        .mask-cloud-right {
            -webkit-mask-image:
                radial-gradient(ellipse 55% 55% at 90% 95%, black 25%, transparent 65%),
                radial-gradient(ellipse 45% 45% at 75% 75%, black 15%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 65% 85%, black 20%, transparent 65%),
                radial-gradient(ellipse 35% 35% at 95% 65%, black 10%, transparent 50%);
            mask-image:
                radial-gradient(ellipse 55% 55% at 90% 95%, black 25%, transparent 65%),
                radial-gradient(ellipse 45% 45% at 75% 75%, black 15%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 65% 85%, black 20%, transparent 65%),
                radial-gradient(ellipse 35% 35% at 95% 65%, black 10%, transparent 50%);
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
